<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="gene問診">
  <title>gene 問診チェックアプリ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="logo-wrap">
        <div class="logo-mark" aria-hidden="true"></div>
        <div class="logo-text">gene</div>
      </div>
      <div class="title-wrap">
        <h1>問診チェック</h1>
        <p class="lead">気になる症状をタップしてください。選択内容は自動集計され、結果画面で説明用表示ができます。</p>
      </div>
    </header>

    <section class="panel top-panel">
      <div class="patient-grid">
        <label class="field">
          <span>お名前</span>
          <input id="patientName" type="text" placeholder="任意">
        </label>
        <label class="field">
          <span>日付</span>
          <input id="visitDate" type="date">
        </label>
      </div>

      <div class="summary-grid">
        <div class="summary-box">
          <small>選択数</small>
          <strong id="selectedCount">0</strong>
        </div>
        <div class="summary-box">
          <small>自動判定</small>
          <strong id="severityNow">軽度</strong>
        </div>
        <div class="summary-box">
          <small>カテゴリ数</small>
          <strong id="categoryTotal">0</strong>
        </div>
      </div>

      <div class="button-row">
        <button id="installBtn" class="btn btn-sub hidden" type="button">ホーム画面に追加</button>
        <button id="resetBtn" class="btn btn-sub" type="button">リセット</button>
        <button id="resultBtn" class="btn btn-main" type="button">集計を見る</button>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>症状項目</h2>
        <p id="metaText">0カテゴリ / 0項目</p>
      </div>
      <div id="categoryContainer" class="category-container"></div>
    </section>

    <section id="resultSection" class="panel result-section" hidden>
      <div class="section-head">
        <h2>集計結果</h2>
        <p>患者説明用</p>
      </div>

      <div class="result-grid">
        <div class="result-box">
          <small>お名前</small>
          <strong id="resultName">-</strong>
        </div>
        <div class="result-box">
          <small>日付</small>
          <strong id="resultDate">-</strong>
        </div>
        <div class="result-box">
          <small>合計チェック数</small>
          <strong id="resultTotal">0</strong>
        </div>
        <div class="result-box">
          <small>自動判定</small>
          <strong id="resultSeverity">軽度</strong>
        </div>
      </div>

      <div class="info-card">
        <h3>判定の目安</h3>
        <p id="judgeComment">現在の状態を丁寧に確認しながら進めます。</p>
      </div>

      <div class="chart-card">
        <div class="section-head mini">
          <h3>カテゴリ別グラフ</h3>
          <p>選択数 / 総項目数</p>
        </div>
        <canvas id="barChart" width="1200" height="900"></canvas>
      </div>

      <div class="selected-card">
        <div class="section-head mini">
          <h3>選択された項目</h3>
          <p id="selectedMeta">0件</p>
        </div>
        <div id="selectedList" class="selected-list"></div>
      </div>

      <div class="button-row end">
        <button id="backBtn" class="btn btn-sub" type="button">上に戻る</button>
        <button id="printBtn" class="btn btn-main" type="button">印刷</button>
      </div>
    </section>
  </div>

  <script id="check-data" type="application/json"></script>
  <script src="app.js"></script>
</body>
</html>
